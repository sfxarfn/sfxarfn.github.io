<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#15110e">
  <title>L'oko Coffee — Scan for Menu</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: #0c0a08;
      font-family: 'Archivo', sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      padding: 24px;
    }

    .card {
      width: 100%;
      max-width: 360px;
      background: #15110e;
      color: #efe7da;
      border: 1px solid rgba(255, 255, 255, .1);
      border-radius: 18px;
      padding: 34px 30px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .card img.logo { height: 60px; width: auto; }

    .brand {
      font-family: 'Archivo', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .42em;
      color: #9a8c79;
      padding-left: .42em;
      margin-top: 2px;
    }

    .headline {
      font-family: 'Instrument Serif', serif;
      font-size: 38px;
      line-height: 1.05;
      color: #f2ecdf;
      margin: 18px 0 2px;
    }

    .sub {
      font-family: 'Space Mono', monospace;
      font-size: 10.5px;
      letter-spacing: .18em;
      color: #7e7263;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    .qr-tile {
      background: #efe7da;
      border-radius: 14px;
      padding: 16px;
      width: 232px;
      height: 232px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .qr-tile svg { width: 100%; height: 100%; display: block; }
    /* library renders modules as black paths; keep them dark on the cream tile */
    .qr-tile svg path { fill: #15110e; }
    .qr-tile svg rect { fill: transparent; }

    .hint {
      font-family: 'Archivo', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: #d6b26a;
      letter-spacing: .04em;
      margin-top: 20px;
    }

    .foot {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: .1em;
      color: #6f6456;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid rgba(255, 255, 255, .08);
      width: 100%;
      line-height: 1.7;
    }

    @media print {
      body { background: #fff; padding: 0; }
      .card { border: none; max-width: none; }
      * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>

<body>
  <div class="card">
    <img class="logo" src="lokocoffee.svg" alt="L'oko Coffee">
    <div class="brand">L'OKO COFFEE</div>

    <div class="headline">Scan for Menu</div>
    <div class="sub">Pindai untuk lihat menu</div>

    <div class="qr-tile" id="qr"></div>

    <div class="hint">Arahkan kamera ke kode QR</div>

    <div class="foot">
      L'OKO COFFEE &amp; ROASTERY<br>
      Pujasera Maron, Genteng, Banyuwangi
    </div>
  </div>

  <script src="qrcode.js"></script>
  <script>
    // Change this to repoint the card at a different link.
    const MENU_URL = "https://sfxarfn.github.io/loko-coffee";

    const qr = qrcode(0, 'M');      // type 0 = auto-size, 'M' = ~15% error correction
    qr.addData(MENU_URL);
    qr.make();
    document.getElementById('qr').innerHTML = qr.createSvgTag({ cellSize: 8, margin: 0, scalable: true });
  </script>
</body>

</html>
